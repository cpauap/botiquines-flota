<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Botiquín</title>
<link rel="stylesheet" href="estilo.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  table { margin-top: 15px; }
  #formAlta { margin-top: 20px; border-top: 1px solid var(--gris-borde); padding-top: 15px; }
  #formAlta input, #formAlta select { margin: 4px; }
</style>
</head>
<body>
  <div class="barra-superior">
    <h1 id="tituloHeli">Cargando...</h1>
    <div>
      <button onclick="window.location.href='panel.html'">← Panel</button>
      <button onclick="verHistorico()">Histórico</button>
      <button onclick="window.location.href='exportar.html?helicoptero='+helicopteroId">Exportar</button>
    </div>
  </div>
  <div class="contenedor">
  <div id="fotoSeccion" class="tarjeta">
    <img id="fotoActual" style="max-width: 200px; display: none; border-radius: 6px;">
    <br>
    <input type="file" id="inputFoto" accept="image/*">
    <button onclick="subirFoto()">Guardar foto de portada</button>
  </div>
  <div class="tarjeta">
    Estado del helicóptero:
    <select id="estadoHeli" onchange="cambiarEstadoHeli()">
      <option value="en servicio">En servicio</option>
      <option value="fuera de servicio">Fuera de servicio</option>
    </select>
  </div>

  <div id="documentosSeccion" class="tarjeta">
    <h3>Documentos (actas, etc.)</h3>
    <ul id="listaDocumentos"></ul>
    <input type="text" id="nombreDocumento" placeholder="Nombre del documento">
    <input type="file" id="inputDocumento">
    <button onclick="subirDocumento()">Subir documento</button>
  </div>

  <div class="tarjeta">
  <table>
    <thead>
      <tr><th>Categoría</th><th>Marca</th><th>Modelo</th><th>Caducidad / Cantidad</th><th>Estado</th><th>Acción</th></tr>
    </thead>
    <tbody id="filasItems"></tbody>
  </table>

  <div id="formAlta">
    <h3>Añadir producto</h3>
    <select id="categoria_id" onchange="cargarProductosCatalogo()"></select>
    <select id="producto_catalogo" onchange="seleccionarProductoCatalogo()"></select>
    <input type="text" id="marca" placeholder="Marca">
    <input type="text" id="modelo" placeholder="Modelo">
    <label><input type="checkbox" id="caduca" checked onchange="toggleCaduca()"> Caduca</label>
    <input type="date" id="fecha_caducidad">
    <input type="number" id="cantidad" placeholder="Cantidad" value="1" min="1">
    <input type="text" id="nota" placeholder="Nota (motivo del reemplazo, opcional)" style="width: 250px;">
    <button id="btnGuardar" onclick="añadirItem()">Guardar</button>
  </div>
  </div>
  </div>

  <script>
    const SUPABASE_URL = "https://pfyvliaknlpuawuppsko.supabase.co";
    const SUPABASE_KEY = "sb_publishable_f3F70B-1EnU3aRpQaFu7_A_szShexxl";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const helicopteroId = params.get("helicoptero");
    let botiquinId = null;
    let reemplazandoId = null;

    function claseSemaforo(item) {
      if (!item.caduca || !item.fecha_caducidad) return "";
      const hoy = new Date();
      const cad = new Date(item.fecha_caducidad);
      const dias = Math.floor((cad - hoy) / (1000 * 60 * 60 * 24));
      if (dias < 0) return "rojo";
      if (dias <= 45) return dias <= 15 ? "rojo" : "ambar";
      return "verde";
    }

    function toggleCaduca() {
      const marcado = document.getElementById("caduca").checked;
      document.getElementById("fecha_caducidad").style.display = marcado ? "inline" : "none";
    }

    async function cargarCategorias() {
      const { data: categorias } = await client
        .from("categorias_producto")
        .select("id, nombre")
        .order("orden");

      const select = document.getElementById("categoria_id");
      select.innerHTML = "";
      categorias.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.innerText = c.nombre;
        select.appendChild(opt);
      });

      cargarProductosCatalogo();
    }

    async function cargarProductosCatalogo() {
      const categoriaId = document.getElementById("categoria_id").value;
      const { data: productos } = await client
        .from("catalogo_productos")
        .select("id, marca, modelo")
        .eq("categoria_id", categoriaId)
        .order("marca");

      const select = document.getElementById("producto_catalogo");
      select.innerHTML = "";

      const optNuevo = document.createElement("option");
      optNuevo.value = "otro";
      optNuevo.innerText = "Otro (especificar)";
      select.appendChild(optNuevo);

      (productos || []).forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.dataset.marca = p.marca;
        opt.dataset.modelo = p.modelo || "";
        opt.innerText = [p.marca, p.modelo].filter(Boolean).join(" ");
        select.appendChild(opt);
      });

      seleccionarProductoCatalogo();
    }

    function seleccionarProductoCatalogo() {
      const valor = document.getElementById("producto_catalogo").value;
      const inputMarca = document.getElementById("marca");
      const inputModelo = document.getElementById("modelo");

      if (valor === "otro") {
        inputMarca.value = "";
        inputModelo.value = "";
        inputMarca.style.display = "inline";
        inputModelo.style.display = "inline";
        inputMarca.disabled = false;
        inputModelo.disabled = false;
      } else {
        const opt = document.getElementById("producto_catalogo").selectedOptions[0];
        inputMarca.value = opt.dataset.marca || "";
        inputModelo.value = opt.dataset.modelo || "";
        inputMarca.style.display = "none";
        inputModelo.style.display = "none";
        inputMarca.disabled = true;
        inputModelo.disabled = true;
      }
    }

    async function obtenerOCrearBotiquin() {
      let { data } = await client
        .from("botiquines")
        .select("id")
        .eq("helicoptero_id", helicopteroId)
        .maybeSingle();

      if (!data) {
        const { data: nuevo } = await client
          .from("botiquines")
          .insert({ helicoptero_id: helicopteroId })
          .select("id")
          .single();
        data = nuevo;
      }
      return data.id;
    }

    async function cargarItems() {
      const { data: heli } = await client
        .from("helicopteros")
        .select("nombre, estado, foto_url")
        .eq("id", helicopteroId)
        .single();
      document.getElementById("tituloHeli").innerText = "Botiquín - " + heli.nombre;
      document.getElementById("estadoHeli").value = heli.estado;
      if (heli.foto_url) {
        document.getElementById("fotoActual").src = heli.foto_url;
        document.getElementById("fotoActual").style.display = "inline";
      }

      botiquinId = await obtenerOCrearBotiquin();

      const { data: items } = await client
        .from("items")
        .select("*, categorias_producto(nombre)")
        .eq("botiquin_id", botiquinId)
        .eq("estado", "activo")
        .order("fecha_caducidad");

      const filas = document.getElementById("filasItems");
      filas.innerHTML = "";
      items.forEach(item => {
        const tr = document.createElement("tr");
        tr.className = claseSemaforo(item);
        const valorCol = item.caduca ? (item.fecha_caducidad || "") : (item.cantidad + " u");
        tr.innerHTML = `
          <td>${item.categorias_producto?.nombre || ""}</td>
          <td>${item.marca}</td>
          <td>${item.modelo || ""}</td>
          <td>${valorCol}</td>
          <td>${item.estado}</td>
          <td><button onclick="prepararReemplazo('${item.id}')">Reemplazar</button></td>`;
        filas.appendChild(tr);
      });
    }

    async function subirDocumento() {
      const nombre = document.getElementById("nombreDocumento").value;
      const archivo = document.getElementById("inputDocumento").files[0];
      if (!nombre || !archivo) { alert("Pon un nombre y elige un archivo."); return; }

      const ruta = helicopteroId + "/" + Date.now() + "-" + archivo.name;
      const { error: errorSubida } = await client.storage
        .from("documentos-helicopteros")
        .upload(ruta, archivo);

      if (errorSubida) { alert("Error al subir: " + errorSubida.message); return; }

      const { data: sesion } = await client.auth.getSession();

      await client.from("documentos").insert({
        helicoptero_id: helicopteroId,
        nombre: nombre,
        url: ruta,
        subido_por: sesion.session.user.id
      });

      document.getElementById("nombreDocumento").value = "";
      document.getElementById("inputDocumento").value = "";
      cargarDocumentos();
    }

    async function cargarDocumentos() {
      const { data: docs } = await client
        .from("documentos")
        .select("*")
        .eq("helicoptero_id", helicopteroId)
        .order("creado_en", { ascending: false });

      const lista = document.getElementById("listaDocumentos");
      lista.innerHTML = "";

      for (const doc of docs) {
        const { data: firmada } = await client.storage
          .from("documentos-helicopteros")
          .createSignedUrl(doc.url, 3600);

        const li = document.createElement("li");
        li.innerHTML = `<a href="${firmada.signedUrl}" target="_blank">${doc.nombre}</a>`;
        lista.appendChild(li);
      }
    }

    async function subirFoto() {
      const archivo = document.getElementById("inputFoto").files[0];
      if (!archivo) { alert("Elige una imagen primero."); return; }

      const ruta = helicopteroId + "-" + Date.now() + "-" + archivo.name;
      const { error: errorSubida } = await client.storage
        .from("fotos-helicopteros")
        .upload(ruta, archivo);

      if (errorSubida) { alert("Error al subir: " + errorSubida.message); return; }

      const { data: publica } = client.storage
        .from("fotos-helicopteros")
        .getPublicUrl(ruta);

      await client.from("helicopteros")
        .update({ foto_url: publica.publicUrl })
        .eq("id", helicopteroId);

      document.getElementById("fotoActual").src = publica.publicUrl;
      document.getElementById("fotoActual").style.display = "inline";
    }

    function verHistorico() {
      window.location.href = "historico.html?helicoptero=" + helicopteroId;
    }

    async function cambiarEstadoHeli() {
      const nuevoEstado = document.getElementById("estadoHeli").value;
      await client.from("helicopteros")
        .update({ estado: nuevoEstado })
        .eq("id", helicopteroId);
    }

    function prepararReemplazo(itemId) {
      reemplazandoId = itemId;
      document.getElementById("btnGuardar").innerText = "Guardar reemplazo";
      document.getElementById("formAlta").scrollIntoView({ behavior: "smooth" });
    }

    async function añadirItem() {
      const categoria_id = document.getElementById("categoria_id").value;
      const marca = document.getElementById("marca").value;
      const modelo = document.getElementById("modelo").value;
      const caduca = document.getElementById("caduca").checked;
      const fecha_caducidad = document.getElementById("fecha_caducidad").value;
      const cantidad = document.getElementById("cantidad").value;
      const nota = document.getElementById("nota").value;

      if (!categoria_id || !marca || (caduca && !fecha_caducidad)) {
        alert("Rellena al menos categoría, marca, y la fecha de caducidad si el producto caduca.");
        return;
      }

      if (reemplazandoId) {
        await client.from("items")
          .update({ estado: "reemplazado", nota: nota || "Reemplazado" })
          .eq("id", reemplazandoId);
      }

      await client.from("items").insert({
        botiquin_id: botiquinId,
        categoria_id,
        marca,
        modelo,
        caduca,
        fecha_caducidad: caduca ? fecha_caducidad : null,
        cantidad
      });

      const esProductoNuevo = document.getElementById("producto_catalogo").value === "otro";
      if (esProductoNuevo) {
        await client.from("catalogo_productos")
          .upsert({ categoria_id, marca, modelo }, { onConflict: "categoria_id,marca,modelo" });
      }

      reemplazandoId = null;
      document.getElementById("btnGuardar").innerText = "Guardar";
      document.getElementById("caduca").checked = true;
      toggleCaduca();
      document.getElementById("fecha_caducidad").value = "";
      document.getElementById("cantidad").value = "1";
      document.getElementById("nota").value = "";

      await cargarProductosCatalogo();
      cargarItems();
    }

    cargarItems();
    cargarDocumentos();
    cargarCategorias();
  </script>
</body>
</html>
