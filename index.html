<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Botiquines Flota - Acceso</title>
<link rel="stylesheet" href="estilo.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .contenedor-login { max-width: 380px; margin: 100px auto; position: relative; z-index: 1; }
  input { display: block; width: 100%; margin-bottom: 10px; }
  #mensaje { color: var(--rojo); margin-top: 10px; font-size: 14px; }
</style>
</head>
<body>
  <div class="contenedor-login tarjeta">
    <h2>Acceso - Botiquines Flota</h2>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="iniciarSesion()">Entrar</button>
    <p id="mensaje"></p>
  </div>

  <script>
    const SUPABASE_URL = "https://pfyvliaknlpuawuppsko.supabase.co";
    const SUPABASE_KEY = "sb_publishable_f3F70B-1EnU3aRpQaFu7_A_szShexxl";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function iniciarSesion() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById("mensaje").innerText = "Error: " + error.message;
      } else {
        window.location.href = "panel.html";
      }
    }
  </script>
</body>
</html>
